<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Website Questionnaire</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            color: #333;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
        }
        h2 {
            color: #3498db;
            border-bottom: 2px solid #eee;
            padding-bottom: 8px;
            margin-top: 30px;
        }
        .form-group {
            margin-bottom: 20px;
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 5px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        input[type="text"], 
        input[type="date"],
        textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .checkbox-group {
            margin: 10px 0;
        }
        .checkbox-group label {
            display: flex;
            align-items: center;
            font-weight: normal;
            margin: 5px 0;
            cursor: pointer;
        }
        input[type="checkbox"] {
            margin-right: 10px;
        }
        .inline-input {
            display: inline-block;
            width: auto;
            margin-left: 5px;
        }
        button {
            background-color: #3498db;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            display: block;
            margin: 30px auto;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .required:after {
            content: " *";
            color: red;
        }
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <h1>Business Website Questionnaire</h1>
    <form id="businessQuestionnaire">
        <h2>1. Basic Information</h2>
        
        <div class="form-group">
            <label for="businessName" class="required">Business name(s):</label>
            <p><em>If multiple businesses, please list all</em></p>
            <textarea id="businessName" name="businessName" rows="3" required></textarea>
            
            <label>Type of business:</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="businessType" value="transient"> Transient / Accommodation</label>
                <label><input type="checkbox" name="businessType" value="solar"> Solar Installation</label>
                <label><input type="checkbox" name="businessType" value="printing"> Printing Shop</label>
                <label>
                    <input type="checkbox" name="businessType" value="other"> Others: 
                    <textarea type="text" name="otherBusinessType" class="inline-input" style="width: 200px;"></textarea>
                </label>
            </div>
            
            <label for="location" class="required">Location of the business(es):</label>
            <p><em>One location per line</em></p>
            <textarea type="text" id="location" name="location" required></textarea>
            
            <label>Are these separate businesses or under one brand?</label>
            <div class="checkbox-group">
                <label><input type="radio" name="businessStructure" value="separate" required> Separate</label>
                <label><input type="radio" name="businessStructure" value="oneBrand"> One brand only</label>
            </div>
        </div>

        <h2>2. Website Goals</h2>
        <div class="form-group">
            <label>What is the main purpose of the website? (Check all that apply)</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="purpose" value="booking"> Online booking (clients book directly)</label>
                <label><input type="checkbox" name="purpose" value="inquiry"> Inquiry / contact form</label>
                <label><input type="checkbox" name="purpose" value="services"> Show services & pricing</label>
                <label><input type="checkbox" name="purpose" value="payments"> Payments online</label>
                <label><input type="checkbox" name="purpose" value="monitoring"> Monitoring sales / income</label>
                <label><input type="checkbox" name="purpose" value="presence"> Just online presence (info only)</label>
            </div>
            
            <label>Which business needs online booking?</label>
            <div class="checkbox-group">
                <label><input type="radio" name="bookingNeeds" value="transient"> Transient only</label>
                <label><input type="radio" name="bookingNeeds" value="solar"> Solar Installation</label>
                <label><input type="radio" name="bookingNeeds" value="printing"> Printing Shop</label>
                <label><input type="radio" name="bookingNeeds" value="all"> All of the above</label>
            </div>
            
            <label>Target launch date:</label>
            <div class="checkbox-group">
                <label><input type="radio" name="launchDate" value="asap" required> ASAP (within 1 week)</label>
                <label><input type="radio" name="launchDate" value="2-4weeks"> 2–4 weeks</label>
                <label><input type="radio" name="launchDate" value="flexible"> Flexible</label>
            </div>
        </div>

        <h2>3. Booking & Payments</h2>
        <div class="form-group">
            <label>How do you want clients to book?</label>
            <div class="checkbox-group">
                <label><input type="radio" name="bookingMethod" value="simpleForm" required> Simple form (name, date, message)</label>
                <label><input type="radio" name="bookingMethod" value="calendar"> Calendar-based booking</label>
                <label><input type="radio" name="bookingMethod" value="airbnb"> Airbnb only (link from website)</label>
                <label><input type="radio" name="bookingMethod" value="unsure"> Not sure yet</label>
            </div>
            
            <label>Do you want online payments?</label>
            <div class="checkbox-group">
                <label><input type="radio" name="onlinePayments" value="yes"> Yes</label>
                <label><input type="radio" name="onlinePayments" value="no"> No</label>
                <label><input type="radio" name="onlinePayments" value="later"> Maybe later</label>
            </div>
            
            <label>Preferred payment methods:</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="paymentMethods" value="cash"> Cash</label>
                <label><input type="checkbox" name="paymentMethods" value="bank"> Bank transfer</label>
                <label><input type="checkbox" name="paymentMethods" value="gcash"> GCash</label>
                <label><input type="checkbox" name="paymentMethods" value="paypal"> PayPal</label>
                <label><input type="checkbox" name="paymentMethods" value="credit"> Credit Card</label>
                <label><input type="checkbox" name="paymentMethods" value="unsure"> Not sure</label>
            </div>
        </div>

        <h2>4. Monitoring & Finances</h2>
        <div class="form-group">
            <label>What do you want to monitor while abroad (Australia)?</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="monitoring" value="bookings"> Number of bookings</label>
                <label><input type="checkbox" name="monitoring" value="income"> Income / expenses</label>
                <label><input type="checkbox" name="monitoring" value="sales"> Daily / monthly sales</label>
                <label><input type="checkbox" name="monitoring" value="clients"> Client details</label>
                <label><input type="checkbox" name="monitoring" value="all"> All of the above</label>
            </div>
            
            <label>Are you okay using Google Sheets as a tracking system?</label>
            <div class="checkbox-group">
                <label><input type="radio" name="googleSheets" value="yes"> Yes</label>
                <label><input type="radio" name="googleSheets" value="no"> No</label>
                <label><input type="radio" name="googleSheets" value="suggestions"> Not sure (open to suggestions)</label>
            </div>
            
            <label>Do you need real-time access to reports?</label>
            <div class="checkbox-group">
                <label><input type="radio" name="realtimeReports" value="yes"> Yes</label>
                <label><input type="radio" name="realtimeReports" value="no"> No</label>
            </div>
        </div>

        <h2>5. Content & Assets</h2>
        <div class="form-group">
            <label>Do you already have the following?</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="assets" value="logo"> Logo</label>
                <label><input type="checkbox" name="assets" value="photos"> Business photos</label>
                <label><input type="checkbox" name="assets" value="descriptions"> Service descriptions</label>
                <label><input type="checkbox" name="assets" value="prices"> Prices</label>
                <label><input type="checkbox" name="assets" value="none"> None yet</label>
            </div>
            
            <label>Do you want one website for all businesses or separate pages?</label>
            <div class="checkbox-group">
                <label><input type="radio" name="websiteStructure" value="oneSite"> One website, different pages</label>
                <label><input type="radio" name="websiteStructure" value="separateSites"> Separate websites</label>
                <label><input type="radio" name="websiteStructure" value="unsure"> Not sure</label>
            </div>
        </div>

        <h2>6. Budget & Expectations</h2>
        <div class="form-group">
            <label>Estimated budget for the website:</label>
            <div class="checkbox-group">
                <label><input type="radio" name="budget" value="minimal" required> Very minimal / free</label>
                <label><input type="radio" name="budget" value="5-10k"> ₱5,000 – ₱10,000</label>
                <label><input type="radio" name="budget" value="10-25k"> ₱10,000 – ₱25,000</label>
                <label><input type="radio" name="budget" value="25k+"> ₱25,000+</label>
                <label><input type="radio" name="budget" value="unsure"> Not sure</label>
            </div>
            
            <label>Are you open to starting simple and upgrading later?</label>
            <div class="checkbox-group">
                <label><input type="radio" name="upgradeLater" value="yes"> Yes</label>
                <label><input type="radio" name="upgradeLater" value="no"> No</label>
            </div>
            
            <label>Do you prefer:</label>
            <div class="checkbox-group">
                <label><input type="radio" name="preference" value="cheap"> Cheapest solution</label>
                <label><input type="radio" name="preference" value="balanced"> Balanced (cost + reliability)</label>
                <label><input type="radio" name="preference" value="professional"> Long-term professional system</label>
            </div>
        </div>

        <h2>7. Maintenance & Responsibility</h2>
        <div class="form-group">
            <label>Who will update the website?</label>
            <div class="checkbox-group">
                <label><input type="radio" name="maintenance" value="owner"> Owner</label>
                <label><input type="radio" name="maintenance" value="staff"> Staff</label>
                <label><input type="radio" name="maintenance" value="developer"> Developer</label>
                <label><input type="radio" name="maintenance" value="unsure"> Not sure</label>
            </div>
            
            <label>Do you need training on how to use it?</label>
            <div class="checkbox-group">
                <label><input type="radio" name="training" value="yes"> Yes</label>
                <label><input type="radio" name="training" value="no"> No</label>
            </div>
        </div>

        <h2>Optional (But Helpful)</h2>
        <div class="form-group">
            <label for="exampleSites">Websites you like or want to copy the style of:</label>
            <textarea id="exampleSites" name="exampleSites" rows="3" placeholder="Please include URLs"></textarea>
            
            <label for="otherFeatures">Other features you want (chat, WhatsApp button, reports, etc.):</label>
            <textarea id="otherFeatures" name="otherFeatures" rows="3"></textarea>
        </div>

        <button type="submit">Submit Questionnaire</button>
    </form>

    <script>
        document.getElementById('businessQuestionnaire').addEventListener('submit', async function(e) {
          e.preventDefault();
          
          const form = e.target;
          const formData = new FormData(form);
          const submitButton = form.querySelector('button[type="submit"]');
          const originalButtonText = submitButton.textContent;
          
          try {
              // Disable button and show loading state
              submitButton.disabled = true;
              submitButton.textContent = 'Submitting...';
              
              // Convert form data to object
              const data = {};
              formData.forEach((value, key) => {
                  // Handle checkboxes and radio buttons
                  if (data[key] === undefined) {
                      data[key] = value;
                  } else {
                      if (!Array.isArray(data[key])) {
                          data[key] = [data[key]];
                      }
                      data[key].push(value);
                  }
              });
              
              // Add timestamp
              data['timestamp'] = new Date().toISOString();
              
              // Send data to Google Apps Script
              const response = await fetch('https://script.google.com/macros/s/AKfycbwHxxgPYjyIhVH5xrlNgyuNifbqTo0hh-7lzUI3uhEJSH8-iLFZZhMab0YfUfSaWuej/exec', {
                  method: 'POST',
                  mode: 'cors', // Enable CORS
                  cache: 'no-cache',
                  body: JSON.stringify(data),
                  headers: {
                      'Content-Type': 'application/json'
                  }
              });
              
              const result = await response.json();
              
              if (result.result === 'success') {
                  alert('Thank you! Your response has been submitted successfully.');
                  form.reset();
              } else {
                  throw new Error(result.error || 'Unknown error occurred');
              }
          } catch (error) {
              console.error('Error:', error);
              alert('There was an error submitting the form. Please try again later.');
          } finally {
              // Re-enable button
              submitButton.disabled = false;
              submitButton.textContent = originalButtonText;
          }
        });
    </script>
</body>
</html>
