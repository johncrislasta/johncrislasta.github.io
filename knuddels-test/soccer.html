<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canvas Soccer Playground</title>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #87ceeb;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: grab;
    }

    canvas:active {
      cursor: grabbing;
    }
  </style>
</head>
<body>

<canvas id="scene"></canvas>

<script>

  const canvas = document.getElementById('scene');
  const ctx = canvas.getContext('2d');

  const hitCageAudio = new Audio('assets/audio/hit-cage.mp3');
  const bounceAudio1 = new Audio(`assets/audio/ball-bounce-1.mp3`);
  const bounceAudio2 = new Audio(`assets/audio/ball-bounce-2.mp3`);
  const bounceAudio3 = new Audio(`assets/audio/ball-bounce-3.mp3`);
  const bounceAudio4 = new Audio(`assets/audio/ball-bounce-4.mp3`);
  const bounceAudio5 = new Audio(`assets/audio/ball-bounce-5.mp3`);


  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);


  const gravity = 0.25;
  const friction = 0.992;
  const bounce = 0.75;
  const floorHeight = 140;
  const angularDamping = 0.98;

  const mouse = { x: 0, y: 0, down: false };

  // ─── CLOUDS ────────────────────────────────────────────────────────────────
  // Each cloud only needs x, y, scale – GSAP owns the x motion.

  const clouds = [
    { x: 100,  y: 100, scale: 1   },
    { x: 500,  y: 160, scale: 1.4 },
    { x: 1000, y: 90,  scale: 0.9 }
  ];

  /**
   * Animate a single cloud from its current x to off-screen right,
   * then instantly snap it back to the left edge and repeat.
   * Duration is derived from a pixels-per-second speed so the feel
   * matches what the old manual loop produced.
   */
  function animateCloud(cloud, speedPx = 0.72) {
    // pixels remaining until the cloud disappears off the right
    const distanceLeft = canvas.width + 120 - cloud.x;
    const duration = distanceLeft / (speedPx * 60); // 60 fps equivalent

    gsap.to(cloud, {
      x: canvas.width + 120,
      duration,
      ease: 'none',
      onComplete() {
        cloud.x = -120;                         // snap back to left
        // Full traversal for future loops
        const fullDuration = (canvas.width + 240) / (speedPx * 60);
        gsap.to(cloud, {
          x: canvas.width + 120,
          duration: fullDuration,
          ease: 'none',
          repeat: -1,                           // loop forever
          onRepeat() { cloud.x = -120; }
        });
      }
    });
  }

  // Kick off a different base speed per cloud (mirrors the original speed values)
  animateCloud(clouds[0], 0.72);   // was speed 0.12 * 6
  animateCloud(clouds[1], 0.48);   // was speed 0.08 * 6
  animateCloud(clouds[2], 0.90);   // was speed 0.15 * 6


  // ─── BIRDS ─────────────────────────────────────────────────────────────────

  const birds = [];

  function spawnBird() {
    const bird = {
      x: -50,
      y: 80 + Math.random() * 120,
      wing: 0   // wing phase – updated in drawBird each frame
    };

    birds.push(bird);

    // Random speed between 2–4 px/frame → convert to px/s for GSAP
    const speedPxPerFrame = 2 + Math.random() * 2;
    const totalDistance = canvas.width + 150;          // -50 → canvas.width+100
    const duration = totalDistance / (speedPxPerFrame * 60);

    gsap.to(bird, {
      x: canvas.width + 100,
      duration,
      ease: 'none',
      onComplete() {
        const i = birds.indexOf(bird);
        if (i !== -1) birds.splice(i, 1);
      }
    });
  }

  setInterval(spawnBird, 4000);
  spawnBird();


  // ─── BALL ──────────────────────────────────────────────────────────────────

  const ball = {
    x: 260,
    y: canvas.height - 160,
    radius: 42,
    vx: 0,
    vy: 0,
    rotation: 0,
    rotationSpeed: 0,
    dragging: false,
    dragOffsetX: 0,
    dragOffsetY: 0,
    lastX: 0,
    lastY: 0
  };


  // ─── DRAW HELPERS ──────────────────────────────────────────────────────────

  function drawSky() {
    const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
    gradient.addColorStop(0, '#7dd3fc');
    gradient.addColorStop(0.5, '#bae6fd');
    gradient.addColorStop(1, '#86efac');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  function drawMountains() {
    const mountains = [
      { x: -100, width: 500, height: 360, color: '#4b7f52' },
      { x: 250,  width: 550, height: 340, color: '#3f6d47' },
      { x: 850,  width: 600, height: 380, color: '#537f5b' }
    ];

    mountains.forEach((m) => {
      ctx.beginPath();
      ctx.moveTo(m.x, canvas.height - floorHeight);
      ctx.lineTo(m.x + m.width / 2, canvas.height - m.height - floorHeight);
      ctx.lineTo(m.x + m.width, canvas.height - floorHeight);
      ctx.closePath();
      ctx.fillStyle = m.color;
      ctx.fill();

      ctx.beginPath();
      ctx.moveTo(m.x + m.width / 2 - 40, canvas.height - m.height - 90);
      ctx.lineTo(m.x + m.width / 2,      canvas.height - m.height - 150);
      ctx.lineTo(m.x + m.width / 2 + 40, canvas.height - m.height - 90);
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.fill();
    });
  }

  function drawCloud(cloud) {
    ctx.save();
    ctx.translate(cloud.x, cloud.y);
    ctx.scale(cloud.scale, cloud.scale);
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.arc(0,  0,   30, 0, Math.PI * 2);
    ctx.arc(30, -10, 35, 0, Math.PI * 2);
    ctx.arc(65, 0,   28, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawBird(bird) {
    ctx.save();
    ctx.translate(bird.x, bird.y);

    // Wing phase still advances each draw call – purely visual, not positional
    bird.wing += 0.2;
    const flap = Math.sin(bird.wing) * 5;

    ctx.strokeStyle = '#1e293b';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-10, 0);
    ctx.quadraticCurveTo(-2,  -flap, 0, 0);
    ctx.quadraticCurveTo( 8,  -flap, 16, 0);
    ctx.stroke();
    ctx.restore();
  }

  function drawGrass() {
    const gradient = ctx.createLinearGradient(0, canvas.height - 180, 0, canvas.height);
    gradient.addColorStop(0, '#4ade80');
    gradient.addColorStop(1, '#15803d');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, canvas.height - 180, canvas.width, 180);
  }

  // Draw Walls on the left and right with a rectangle that spans from top to bottom
  function drawWalls() {
    if (fenceImage.complete && fenceImage.naturalWidth > 0) {
      ctx.save();

      drawSkewedImage(fenceImage, 0, 0, 300, canvas.height, 0, -0.5);
      drawSkewedImage(fenceImage, canvas.width - 300, -1 * canvas.height + floorHeight, 300, canvas.height, 0,0.5);
    } else {
      ctx.fillStyle = '#FFFFFF77';
      ctx.fillRect(0, 0, 20, canvas.height);
      ctx.fillRect(canvas.width - 20, 0, 20, canvas.height);
    }
  }

  function drawSkewedImage(img, x, y, width, height, xSkew, ySkew){

    // apply a skew
    // transform(xScale, ySkew, xSkew, yScale, xTranslation, yTranslation)
    ctx.transform(1,ySkew,xSkew,1,0,0);

    // draw the reflected image
    ctx.drawImage(img, x, y, width, height);
    // clean up by setting all transforms to default
    ctx.setTransform(1,0,0,1,0,0);
  }

  let fenceImage = new Image();

  function loadFenceImage() {
    fenceImage.src = 'assets/img/fence.svg';
    fenceImage.onload  = () => console.log('Fence image loaded.');
    fenceImage.onerror = () => console.error('Error loading fence image – using fallback.');
  }

  function drawBall() {
    ctx.save();
    ctx.translate(ball.x, ball.y);
    ctx.rotate(ball.rotation);

    if (ballImage.complete && ballImage.naturalWidth > 0) {
      ctx.drawImage(ballImage, -ball.radius, -ball.radius, ball.radius * 2, ball.radius * 2);
    } else {
      const gradient = ctx.createRadialGradient(-12, -12, 5, 0, 0, ball.radius);
      gradient.addColorStop(0, '#ffffff');
      gradient.addColorStop(1, '#dddddd');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(0, 0, ball.radius, 0, Math.PI * 2);
      ctx.fill();

      for (let i = 0; i < 6; i++) {
        const angle = (Math.PI * 2 / 6) * i;
        ctx.beginPath();
        ctx.arc(Math.cos(angle) * 18, Math.sin(angle) * 18, 10, 0, Math.PI * 2);
        ctx.fillStyle = '#111827';
        ctx.fill();
      }
    }

    ctx.restore();
  }

  let ballImage = new Image();

  function loadSoccerBall() {
    ballImage.src = 'assets/img/soccerball.svg';
    ballImage.onload  = () => console.log('Soccerball image loaded.');
    ballImage.onerror = () => console.error('Error loading soccerball.svg – using fallback.');
  }


  // ─── PHYSICS ───────────────────────────────────────────────────────────────

  function updateBallPhysics() {
    if (ball.dragging) return;

    ball.vy += gravity;
    ball.x  += ball.vx;
    ball.y  += ball.vy;

    const floor = canvas.height - floorHeight - ball.radius;
    const restThreshold = 0.19;
    let prevY = ball.y;

    ball.vx *= friction;
    ball.vy *= 0.999;
    ball.rotationSpeed *= angularDamping;

    // Floor collision
    if (ball.y > floor) {
      const impactSpeed = Math.abs(ball.vy); // capture BEFORE the bounce flip

      ball.y   = floor;
      ball.vy *= -bounce;
      if (Math.abs(ball.vy) < restThreshold) ball.vy = 0;

      // Only play sound when the impact was forceful enough to be audible.
      // This prevents the sound triggering on micro-settle frames where the
      // ball is effectively resting on the ground.
      const minAudibleImpact = restThreshold * 3;
      if (impactSpeed > minAudibleImpact) {
        const randomBounce = Math.floor(Math.random() * 5) + 1;
        const bounceAudio = [bounceAudio1, bounceAudio2, bounceAudio3, bounceAudio4, bounceAudio5][randomBounce - 1];
        bounceAudio.currentTime = 0;
        bounceAudio.play();
      }
    }


    // Adjust volume based on velocity
    // Formula for calculating the velocity of an object in 2D space is:
    // velocity = sqrt(vx^2 + vy^2)
    // where vx and vy are the components of the velocity vector.
    const velocity = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
    hitCageAudio.volume = Math.min(velocity / 20, 1);
    
    // Wall collisions
    if (ball.x < ball.radius + 150) {
      ball.x   = ball.radius + 150;
      ball.vx *= -bounce;
      hitCageAudio.currentTime = 0;
      hitCageAudio.play();
    }
    if (ball.x > canvas.width - ball.radius - 150) {
      ball.x   = canvas.width - ball.radius - 150;
      ball.vx *= -bounce;
      hitCageAudio.currentTime = 0;
      hitCageAudio.play();
    }


    const isMoving = Math.abs(ball.vx) > restThreshold || Math.abs(ball.vy) > restThreshold;

    if (!isMoving) {
      ball.vx = 0;
      ball.vy = 0;
      ball.rotationSpeed = 0;
    } else {
      ball.rotation += ball.rotationSpeed;

      const onGround = Math.abs(ball.y - floor) < 0.5;
      if (onGround) {
        const targetRotationSpeed = ball.vx / ball.radius;
        ball.rotationSpeed += (targetRotationSpeed - ball.rotationSpeed) * 0.15;
      }

      ball.rotation += ball.rotationSpeed;
    }

    prevY = ball.y;
  }


  // ─── RENDER LOOP ───────────────────────────────────────────────────────────
  // Cloud and bird *positions* are driven by GSAP tweens above.
  // This loop is now a pure draw loop for those elements.

  function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawSky();
    drawMountains();

    // Clouds: GSAP owns cloud.x — just draw them
    clouds.forEach(drawCloud);

    // Birds: GSAP owns bird.x — drawBird handles wing flap visually
    birds.forEach(drawBird);

    drawGrass();
    drawWalls();

    updateBallPhysics();
    drawBall();

    requestAnimationFrame(render);
  }

  loadSoccerBall();
  loadFenceImage();
  render();


  // ─── INPUT ─────────────────────────────────────────────────────────────────

  canvas.addEventListener('mousedown', (e) => {
    mouse.down = true;
    mouse.x = e.clientX;
    mouse.y = e.clientY;

    const dist = Math.hypot(mouse.x - ball.x, mouse.y - ball.y);
    if (dist < ball.radius) {
      ball.dragging    = true;
      ball.dragOffsetX = mouse.x - ball.x;
      ball.dragOffsetY = mouse.y - ball.y;
      ball.lastX = ball.x;
      ball.lastY = ball.y;
    }
  });

  canvas.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;

    if (ball.dragging) {
      ball.x  = mouse.x - ball.dragOffsetX;
      ball.y  = mouse.y - ball.dragOffsetY;
      ball.vx = ball.x - ball.lastX;
      ball.vy = ball.y - ball.lastY;
      ball.lastX = ball.x;
      ball.lastY = ball.y;
    }
  });

  canvas.addEventListener('mouseup', () => {
    mouse.down = false;
    if (ball.dragging) {
      ball.dragging      = false;
      ball.rotationSpeed = ball.vx * 0.05;
    }
  });

</script>
</body>
</html>
