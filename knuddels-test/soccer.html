<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canvas Soccer Playground</title>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: Arial, sans-serif; }
    body {
      background: 
      url('assets/img/brickwall.svg') center 77%  repeat-x,
      linear-gradient(to bottom, #7dd3fc 0%, #bae6fd 50%, #86efac 100%);
    }
    canvas { display: block; width: 100vw; height: 100vh; cursor: grab; }
    canvas:active { cursor: grabbing; }
  </style>


  <link rel="icon" type="image/svg+xml" href="assets/img/soccerball.svg">

</head>
<body>

<canvas id="scene"></canvas>

<script>

  const canvas = document.getElementById('scene');
  const ctx    = canvas.getContext('2d');

  const hitCageAudio = new Audio('assets/audio/hit-cage.mp3');
  const bounceAudios = [1,2,3,4,5].map(n => new Audio(`assets/audio/ball-bounce-${n}.mp3`));

  function resizeCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  const gravity        = 0.25;
  const friction       = 0.992;
  const bounce         = 0.75;
  const floorHeight    = canvas.height * 0.17;
  const groundHeight   = canvas.height * 0.22;
  const fenceWidth     = Math.max(canvas.width * 0.10, 150);
  const fenceAngle     = Math.atan2(groundHeight, fenceWidth);
  const angularDamping = 0.98;

  const mouse = { x: 0, y: 0, down: false };

  // ─── CLOUDS ────────────────────────────────────────────────────────────────
  // Each cloud only needs x, y, scale – GSAP owns the x motion.

  const clouds = [
    { x: 100,  y: 100, scale: 1   },
    { x: 500,  y: 160, scale: 1.4 },
    { x: 1000, y: 90,  scale: 0.9 }
  ];

  /**
   * Animate a single cloud from its current x to off-screen right,
   * then instantly snap it back to the left edge and repeat.
   * Duration is derived from a pixels-per-second speed so the feel
   * matches what the old manual loop produced.
   */
  function animateCloud(cloud, speedPx = 0.72) {
    // pixels remaining until the cloud disappears off the right
    const distanceLeft = canvas.width + 120 - cloud.x;
    const duration = distanceLeft / (speedPx * 60); // 60 fps equivalent

    gsap.to(cloud, {
      x: canvas.width + 120,
      duration,
      ease: 'none',
      onComplete() {
        cloud.x = -120;                         // snap back to left
        // Full traversal for future loops
        const fullDuration = (canvas.width + 240) / (speedPx * 60);
        gsap.to(cloud, {
          x: canvas.width + 120,
          duration: fullDuration,
          ease: 'none',
          repeat: -1,                           // loop forever
          onRepeat() { cloud.x = -120; }
        });
      }
    });
  }

  // Kick off a different base speed per cloud (mirrors the original speed values)
  animateCloud(clouds[0], 0.72);   // was speed 0.12 * 6
  animateCloud(clouds[1], 0.48);   // was speed 0.08 * 6
  animateCloud(clouds[2], 0.90);   // was speed 0.15 * 6


  // ─── BIRDS ─────────────────────────────────────────────────────────────────

  const birds = [];

  function spawnBird() {
    const bird = {
      x: -50,
      y: 80 + Math.random() * 120,
      wing: 0   // wing phase – updated in drawBird each frame
    };

    birds.push(bird);

    // Random speed between 2–4 px/frame → convert to px/s for GSAP
    const speedPxPerFrame = 2 + Math.random() * 2;
    const totalDistance = canvas.width + 150;          // -50 → canvas.width+100
    const duration = totalDistance / (speedPxPerFrame * 60);

    gsap.to(bird, {
      x: canvas.width + 100,
      duration,
      ease: 'none',
      onComplete() {
        const i = birds.indexOf(bird);
        if (i !== -1) birds.splice(i, 1);
      }
    });
  }

  setInterval(spawnBird, 4000);
  spawnBird();


  // ─── BALL ──────────────────────────────────────────────────────────────────

  const soccerball = {
    x: 260,
    y: canvas.height - floorHeight,
    radius: 42, mass: 1,
    vx: 0,
    vy: 0,
    rotation: 0,
    rotationSpeed: 0,
    dragging: false,
    dragOffsetX: 0,
    dragOffsetY: 0,
    lastX: 0,
    lastY: 0
  };

  const basketball = {
    x: canvas.width - fenceWidth - 20,
    y: canvas.height - floorHeight,
    radius: 45, mass: 1.2,
    vx: 0,
    vy: 0,
    rotation: 0,
    rotationSpeed: 0,
    dragging: false,
    dragOffsetX: 0,
    dragOffsetY: 0,
    lastX: 0,
    lastY: 0
  };

  const allBalls = [soccerball, basketball];

  // ── BALL–BALL COLLISION ──────────────────────────────────────────────────────
  // Circle–circle impulse resolution with mass-weighted separation and restitution.
  function resolveBallBallCollision(a, b) {
    const dx   = b.x - a.x;
    const dy   = b.y - a.y;
    const dist = Math.hypot(dx, dy);
    const minDist = a.radius + b.radius;

    if (dist >= minDist || dist === 0) return;

    // Collision normal
    const nx = dx / dist;
    const ny = dy / dist;

    // Push apart so they no longer overlap, weighted by mass
    const overlap     = minDist - dist;
    const totalMass   = a.mass + b.mass;
    a.x -= nx * overlap * (b.mass / totalMass);
    a.y -= ny * overlap * (b.mass / totalMass);
    b.x += nx * overlap * (a.mass / totalMass);
    b.y += ny * overlap * (a.mass / totalMass);

    // Relative velocity along the normal
    const dvx = a.vx - b.vx;
    const dvy = a.vy - b.vy;
    const dvn = dvx * nx + dvy * ny;

    // Don't resolve if already separating
    if (dvn >= 0) return;

    const restitution = 0.72;   // slightly less than wall bounce — feels natural
    const j = -(1 + restitution) * dvn / (1 / a.mass + 1 / b.mass);

    a.vx += (j / a.mass) * nx;
    a.vy += (j / a.mass) * ny;
    b.vx -= (j / b.mass) * nx;
    b.vy -= (j / b.mass) * ny;

    // Transfer a little spin on impact
    const tangentialSpeed = dvx * ny - dvy * nx;
    a.rotationSpeed -= tangentialSpeed * 0.012;
    b.rotationSpeed += tangentialSpeed * 0.012;
  }

  // ── DRAW HELPERS ─────────────────────────────────────────────────────────────
  function drawCloud(cloud) {
    ctx.save();
    ctx.translate(cloud.x, cloud.y);
    ctx.scale(cloud.scale, cloud.scale);
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.arc(0,  0,   30, 0, Math.PI * 2);
    ctx.arc(30, -10, 35, 0, Math.PI * 2);
    ctx.arc(65, 0,   28, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawBird(bird) {
    ctx.save();
    ctx.translate(bird.x, bird.y);

    // Wing phase still advances each draw call – purely visual, not positional
    bird.wing += 0.2;
    const flap = Math.sin(bird.wing) * 5;

    ctx.strokeStyle = '#1e293b';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-10, 0);
    ctx.quadraticCurveTo(-2,  -flap, 0, 0);
    ctx.quadraticCurveTo( 8,  -flap, 16, 0);
    ctx.stroke();
    ctx.restore();
  }

  function drawGround() {
    const gradient = ctx.createLinearGradient(0, canvas.height - groundHeight, 0, canvas.height);
    gradient.addColorStop(0, '#949494');
    gradient.addColorStop(1, '#4a4a4a');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, canvas.height - groundHeight, canvas.width, groundHeight);
  }

  // ── FENCES ───────────────────────────────────────────────────────────────────
  // Left fence:  horizontal grid lines slope at +45° (down-right = perspective toward right)
  // Right fence: horizontal grid lines slope at -45° (up-right   = perspective toward left)
  // Inner vertical edge of each fence is drawn as a thick pole.
  function drawWalls() {
    const spacing    = 40;    // px between grid lines
    const thinLine   = 1.5;
    const poleWidth  = 5;
    const color      = '#111';
    const slope      = -1 * Math.tan(fenceAngle); // = 1 for 45°
    const hypoteneus = Math.sqrt(fenceWidth * fenceWidth + groundHeight * groundHeight);

    ctx.strokeStyle = color;
    ctx.lineCap     = 'butt';

    // ── LEFT FENCE ─────────────────────────────────────────────────────────────
    ctx.save();
    ctx.beginPath();
    ctx.rect(0, 0, fenceWidth, canvas.height);
    ctx.clip();

    ctx.lineWidth = thinLine;

    let numLines = Math.ceil(fenceWidth / spacing);

    // Vertical lines with perspective
    for (let x = 0; x < fenceWidth; x += spacing) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      const c = hypoteneus / (fenceWidth / spacing) * numLines;
      const a = spacing * numLines;
      const b = Math.sqrt(c * c - a * a);

      ctx.lineTo(x, canvas.height - groundHeight + b);
      ctx.stroke();
      numLines--;
    }
    for (let y = canvas.height; y >= 0; y -= spacing) {
      ctx.beginPath();
      ctx.moveTo(0,          y);
      ctx.lineTo(fenceWidth, y + fenceWidth * slope);
      ctx.stroke();
    }

    // Inner pole — rightmost edge of left fence
    ctx.lineWidth = poleWidth;
    ctx.beginPath();
    ctx.moveTo(fenceWidth, 0);
    ctx.lineTo(fenceWidth, canvas.height - groundHeight);
    ctx.stroke();

    ctx.restore();

    // ── RIGHT FENCE ────────────────────────────────────────────────────────────
    const rx = canvas.width - fenceWidth; // left x of the right fence panel

    ctx.save();
    ctx.beginPath();
    ctx.rect(rx, 0, fenceWidth, canvas.height);
    ctx.clip();

    ctx.lineWidth = thinLine;
    
    numLines = 0;

    // Vertical lines (no perspective — straight up/down)
    for (let x = rx; x < canvas.width; x += spacing) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      const c = hypoteneus / (fenceWidth / spacing) * numLines;
      const a = spacing * numLines;
      const b = Math.sqrt(c * c - a * a);

      ctx.lineTo(x, canvas.height - groundHeight + b);
      ctx.stroke();
      numLines++;
    }


    // Angled horizontal lines at -45° (mirror of left fence).
    // A line anchored at y on the RIGHT edge exits at y + fenceWidth*slope on the LEFT edge.
    for (let y = canvas.height; y >= 0; y -= spacing) {
      ctx.beginPath();
      ctx.moveTo(canvas.width, y);
      ctx.lineTo(rx,           y + fenceWidth * slope);
      ctx.stroke();
    }

    // Inner pole — leftmost edge of right fence
    ctx.lineWidth = poleWidth;
    ctx.beginPath();
    ctx.moveTo(rx, 0);
    ctx.lineTo(rx, canvas.height - groundHeight);
    ctx.stroke();

    ctx.restore();
  }

  function drawBall(ball, ballImage) {
    ctx.save();
    ctx.translate(ball.x, ball.y);
    ctx.rotate(ball.rotation);

    if (ballImage.complete && ballImage.naturalWidth > 0) {
      ctx.drawImage(ballImage, -ball.radius, -ball.radius, ball.radius * 2, ball.radius * 2);
    } else {
      const gradient = ctx.createRadialGradient(-12, -12, 5, 0, 0, ball.radius);
      gradient.addColorStop(0, '#ffffff');
      gradient.addColorStop(1, '#dddddd');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(0, 0, ball.radius, 0, Math.PI * 2);
      ctx.fill();

      for (let i = 0; i < 6; i++) {
        const angle = (Math.PI * 2 / 6) * i;
        ctx.beginPath();
        ctx.arc(Math.cos(angle) * 18, Math.sin(angle) * 18, 10, 0, Math.PI * 2);
        ctx.fillStyle = '#111827';
        ctx.fill();
      }
    }

    ctx.restore();
  }

  // ── IMAGE LOADING ────────────────────────────────────────────────────────────
  let soccerballImage = new Image();

  function loadSoccerBall() {
    soccerballImage.src     = 'assets/img/soccerball.svg';
    soccerballImage.onload  = () => console.log('Soccerball loaded.');
    soccerballImage.onerror = () => console.error('Soccerball load failed – using fallback.');
  }

  let basketballImage = new Image();

  function loadBasketball() {
    basketballImage.src     = 'assets/img/basketball.svg';
    basketballImage.onload  = () => console.log('Basketball loaded.');
    basketballImage.onerror = () => console.error('Basketball load failed – using fallback.');
  }

  // ── BALL PHYSICS ─────────────────────────────────────────────────────────────
  function updateBallPhysics(ball) {
    if (ball.dragging) return;

    ball.vy += gravity;
    ball.x  += ball.vx;
    ball.y  += ball.vy;

    const floor = canvas.height - floorHeight - ball.radius;
    const restThreshold = 0.19;

    ball.vx *= friction;
    ball.vy *= 0.999;
    ball.rotationSpeed *= angularDamping;

    // Floor collision
    if (ball.y > floor) {
      const impactSpeed = Math.abs(ball.vy); // capture BEFORE the bounce flip

      ball.y   = floor;
      ball.vy *= -bounce;
      if (Math.abs(ball.vy) < restThreshold) ball.vy = 0;

      // Only play sound when the impact was forceful enough to be audible.
      // This prevents the sound triggering on micro-settle frames where the
      // ball is effectively resting on the ground.
      const minAudibleImpact = restThreshold * 3;
      if (impactSpeed > minAudibleImpact) {
        const audio = bounceAudios[Math.floor(Math.random() * 5)];
        audio.currentTime = 0;
        audio.play();
      }
    }


    // Adjust volume based on velocity
    // Formula for calculating the velocity of an object in 2D space is:
    // velocity = sqrt(vx^2 + vy^2)
    // where vx and vy are the components of the velocity vector.
    const velocity = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
    
    if(velocity > 0) {
      hitCageAudio.volume = Math.min(velocity / 20, 1);
    }

    const wallOffset = (fenceWidth - (groundHeight - floorHeight));
    // Wall collisions
    if (ball.x < ball.radius + wallOffset) {
      ball.x   = ball.radius + wallOffset;
      ball.vx *= -bounce;
      hitCageAudio.currentTime = 0;
      hitCageAudio.play();
    }
    if (ball.x > canvas.width - ball.radius - wallOffset) {
      ball.x   = canvas.width - ball.radius - wallOffset;
      ball.vx *= -bounce;
      hitCageAudio.currentTime = 0;
      hitCageAudio.play();
    }


    const isMoving = Math.abs(ball.vx) > restThreshold || Math.abs(ball.vy) > restThreshold;

    if (!isMoving) {
      ball.vx = 0;
      ball.vy = 0;
      ball.rotationSpeed = 0;
    } else {
      ball.rotation += ball.rotationSpeed;

      const onGround = Math.abs(ball.y - floor) < 0.5;
      if (onGround) {
        const targetRotationSpeed = ball.vx / ball.radius;
        ball.rotationSpeed += (targetRotationSpeed - ball.rotationSpeed) * 0.15;
      }

      ball.rotation += ball.rotationSpeed;
    }

    prevY = ball.y;
  }


  // ─── RENDER LOOP ───────────────────────────────────────────────────────────
  // Cloud and bird *positions* are driven by GSAP tweens above.
  // This loop is now a pure draw loop for those elements.

  function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Clouds: GSAP owns cloud.x — just draw them
    clouds.forEach(drawCloud);

    // Birds: GSAP owns bird.x — drawBird handles wing flap visually
    birds.forEach(drawBird);

    drawGround();
    drawWalls();

    // Step physics for both balls, then resolve their mutual collision
    updateBallPhysics(soccerball);
    updateBallPhysics(basketball);
    resolveBallBallCollision(soccerball, basketball);

    drawBall(soccerball, soccerballImage);
    drawBall(basketball, basketballImage);

    requestAnimationFrame(render);
  }

  loadSoccerBall();
  loadBasketball();
  render();

  // ── INPUT ────────────────────────────────────────────────────────────────────
  // Single set of listeners — iterate allBalls inside each handler so there's
  // no duplicate-listener problem from registering per-ball.

  canvas.addEventListener('mousedown', (e) => {
    mouse.down = true;
    mouse.x    = e.clientX;
    mouse.y    = e.clientY;

    for (const ball of allBalls) {
      // Skip balls already being dragged (shouldn't happen, but guard anyway)
      if (ball.dragging) continue;
      const dist = Math.hypot(mouse.x - ball.x, mouse.y - ball.y);
      if (dist < ball.radius) {
        ball.dragging    = true;
        ball.dragOffsetX = mouse.x - ball.x;
        ball.dragOffsetY = mouse.y - ball.y;
        ball.lastX       = ball.x;
        ball.lastY       = ball.y;
        break; // only pick one ball per click
      }
    }
  });

  canvas.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;

    for (const ball of allBalls) {
      if (!ball.dragging) continue;
      ball.x  = mouse.x - ball.dragOffsetX;
      ball.y  = mouse.y - ball.dragOffsetY;
      ball.vx = ball.x - ball.lastX;
      ball.vy = ball.y - ball.lastY;
      ball.lastX = ball.x;
      ball.lastY = ball.y;
    }
  });

  canvas.addEventListener('mouseup', () => {
    mouse.down = false;
    for (const ball of allBalls) {
      if (!ball.dragging) continue;
      ball.dragging      = false;
      ball.rotationSpeed = ball.vx * 0.05;
    }
  });
</script>
</body>
</html>
