<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GSAP Canvas Soccer Playground</title>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #87ceeb;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: grab;
    }

    canvas:active {
      cursor: grabbing;
    }
  </style>
</head>
<body>

<canvas id="scene"></canvas>

<script>

const canvas = document.getElementById('scene');
const ctx = canvas.getContext('2d');


function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}


resizeCanvas();
window.addEventListener('resize', resizeCanvas);


const gravity = 0.45;
const friction = 0.992;
const bounce = 0.65;

// Increased damping slightly to prevent jittering/spinning too much when resting
const angularDamping = 0.98;


const mouse = {
  x: 0,
  y: 0,
  down: false
};


const clouds = [
  { x: 100, y: 100, speed: 0.12, scale: 1 },
  { x: 500, y: 160, speed: 0.08, scale: 1.4 },
  { x: 1000, y: 90, speed: 0.15, scale: 0.9 }
];


const birds = [];


function spawnBird() {
  birds.push({
    x: -50,
    y: 80 + Math.random() * 120,
    speed: 2 + Math.random() * 2,
    wing: 0
  });
}


setInterval(spawnBird, 4000);
spawnBird();


const ball = {
  x: 260,
  y: canvas.height - 160,
  radius: 42,
  vx: 0,
  vy: 0,
  rotation: 0,
  rotationSpeed: 0,
  dragging: false,
  dragOffsetX: 0,
  dragOffsetY: 0,
  lastX: 0,
  lastY: 0
};


const cones = [];


for (let i = 0; i < 4; i++) {
  cones.push({
    x: 760 + i * 100,
    y: canvas.height - 145,
    width: 52,
    height: 90,
    rotation: 0,
    vx: 0,
    vy: 0,
    dragVx: 0, // Velocity tracker for dragging
    dragVy: 0,
    dragging: false,
    falling: false
  });
}


function drawSky() {
  const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
  gradient.addColorStop(0, '#7dd3fc');
  gradient.addColorStop(0.5, '#bae6fd');
  gradient.addColorStop(1, '#86efac');


  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}


function drawMountains() {


  const mountains = [
    { x: -100, width: 500, height: 360, color: '#4b7f52' },
    { x: 250, width: 550, height: 340, color: '#3f6d47' },
    { x: 850, width: 600, height: 380, color: '#537f5b' }
  ];


  mountains.forEach((m) => {


    ctx.beginPath();
    ctx.moveTo(m.x, canvas.height - 140);
    ctx.lineTo(m.x + m.width / 2, canvas.height - m.height - 140);
    ctx.lineTo(m.x + m.width, canvas.height - 140);
    ctx.closePath();


    ctx.fillStyle = m.color;
    ctx.fill();


    ctx.beginPath();
    ctx.moveTo(m.x + m.width / 2 - 40, canvas.height - m.height - 90);
    ctx.lineTo(m.x + m.width / 2, canvas.height - m.height - 150);
    ctx.lineTo(m.x + m.width / 2 + 40, canvas.height - m.height - 90);


    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fill();


  });
}


function drawCloud(cloud) {


  ctx.save();
  ctx.translate(cloud.x, cloud.y);
  ctx.scale(cloud.scale, cloud.scale);


  ctx.fillStyle = 'rgba(255,255,255,0.9)';


  ctx.beginPath();
  ctx.arc(0, 0, 30, 0, Math.PI * 2);
  ctx.arc(30, -10, 35, 0, Math.PI * 2);
  ctx.arc(65, 0, 28, 0, Math.PI * 2);
  ctx.fill();


  ctx.restore();
}


function drawBird(bird) {


  ctx.save();
  ctx.translate(bird.x, bird.y);


  bird.wing += 0.2;


  const flap = Math.sin(bird.wing) * 5;


  ctx.strokeStyle = '#1e293b';
  ctx.lineWidth = 2;


  ctx.beginPath();
  ctx.moveTo(-10, 0);
  ctx.quadraticCurveTo(-2, -flap, 0, 0);
  ctx.quadraticCurveTo(8, -flap, 16, 0);
  ctx.stroke();


  ctx.restore();
}


function drawGrass() {


  const gradient = ctx.createLinearGradient(0, canvas.height - 180, 0, canvas.height);
  gradient.addColorStop(0, '#4ade80');
  gradient.addColorStop(1, '#15803d');


  ctx.fillStyle = gradient;
  ctx.fillRect(0, canvas.height - 180, canvas.width, 180);
}

function drawBall() {


  ctx.save();


  // We still need translation and rotation for positioning
  ctx.translate(ball.x, ball.y);
  ctx.rotate(ball.rotation);

    // --- MODIFIED DRAWING LOGIC HERE ---
    if (ballImage.complete) {
        // Draw the loaded SVG image at the center (0, 0) of the translated context
        // We use the original radius as a rough size indicator for drawing.
      ctx.drawImage(ballImage, -ball.radius, -ball.radius, ball.radius * 2, ball.radius * 2);

    } else {
        // Fallback/Loading State (Keep the original manual drawing if SVG isn't loaded yet)
        const gradient = ctx.createRadialGradient(-12, -12, 5, 0, 0, ball.radius);
        gradient.addColorStop(0, '#ffffff');
        gradient.addColorStop(1, '#dddddd');

        ctx.fillStyle = gradient;

        ctx.beginPath();
        ctx.arc(0, 0, ball.radius, 0, Math.PI * 2);
        ctx.fill();

        // ... (Keep the code for drawing hexagonal studs/panels)
        for (let i = 0; i < 6; i++) {
            const angle = (Math.PI * 2 / 6) * i;
            ctx.beginPath();
            ctx.arc(
                Math.cos(angle) * 18,
                Math.sin(angle) * 18,
                10,
                0,
                Math.PI * 2
            );
            ctx.fillStyle = '#111827';
            ctx.fill();
        }
    }


  ctx.restore();
}



// NEW: Image placeholder for the soccerball graphic
let ballImage = new Image(); 


/** Function to handle loading the SVG image */
function loadSoccerBall() {
    console.log("Loading soccerball SVG...");
    ballImage.src = 'soccerball.svg'; // <-- Make sure this path is correct!

    // Use a Promise or an Event Listener to ensure subsequent code waits for the image
    ballImage.onload = () => {
        console.log("Soccerball image loaded successfully.");
    };

    ballImage.onerror = () => {
        console.error("Error loading soccerball.svg. Falling back to basic drawing.");
        // Optional: Fallback logic if SVG fails (e.g., keep the old drawBall() method)
    };
}


function drawCone(cone) {


  ctx.save();


  // Note: We use the cone's stored rotation, even if it's currently in a fall state
  ctx.translate(cone.x, cone.y); 
  ctx.rotate(cone.rotation);


  ctx.beginPath();
  ctx.moveTo(0, -cone.height);
  ctx.lineTo(cone.width / 2, 0);
  ctx.lineTo(-cone.width / 2, 0);
  ctx.closePath();


  ctx.fillStyle = '#fb923c';
  ctx.fill();


  ctx.fillStyle = '#ea580c';
  ctx.fillRect(-cone.width / 1.4, -4, cone.width * 1.4, 10);


  ctx.restore();
}


function updateClouds() {


  clouds.forEach((cloud) => {


    cloud.x += cloud.speed;


    if (cloud.x > canvas.width + 120) {
      cloud.x = -120;
    }


  });
}


function updateBirds() {


  for (let i = birds.length - 1; i >= 0; i--) {


    birds[i].x += birds[i].speed;


    if (birds[i].x > canvas.width + 100) {
      birds.splice(i, 1);
    }
  }
}


function updateBallPhysics() {
  if (ball.dragging) return;

  ball.vy += gravity;

  ball.x += ball.vx;
  ball.y += ball.vy;


  ball.rotationSpeed *= angularDamping; // Apply damping to ball spin


  ball.rotation += ball.rotationSpeed;


  ball.vx *= friction;
  ball.rotationSpeed *= friction;


  const floor = canvas.height - 140 - ball.radius;


  if (ball.y > floor) {


    ball.y = floor;
    ball.vy *= -bounce;


    if (Math.abs(ball.vy) < 0.5) {
      ball.vy = 0;
    }
  }


  if (ball.x < ball.radius) {
    ball.x = ball.radius;
    ball.vx *= -bounce;
  }


  if (ball.x > canvas.width - ball.radius) {
    ball.x = canvas.width - ball.radius;
    ball.vx *= -bounce;
  }
}


function updateCones() {

  const floorY = canvas.height - 140; // Defined the physical floor level

  cones.forEach((cone) => {


    if (cone.dragging) {
      cone.rotation = 0;
      return;
    }


    if (cone.falling) {
        // Gravity pull on falling cones
      cone.vy += gravity * 0.3;

        // Update position
      cone.y += cone.vy;

        // Rotational physics: Spin decays over time, but also influenced by horizontal speed
      cone.rotation *= angularDamping; // Damp existing rotation (prevents infinite spin)
      cone.rotation += cone.vx * 0.015; // Small spin based on velocity component


      if (cone.y > floorY + 10) { // Use a margin to prevent jittering above the floor
        cone.y = floorY;
        // If it hits the ground, stop falling and keep current rotation/velocity for rolling effect
        cone.vy = 0;
        cone.falling = false; // No longer actively "falling"
      }
    } else if (!cone.dragging) {
      // If not falling and not dragging, ensure it stays upright (optional reset/rest state)
      cone.rotation *= angularDamping;
  }
  });
}



/** Detects collision between ball (circle) and cone (bounding box). */
function detectConeCollision() {

  const BALL_RADIUS = ball.radius;

  cones.forEach((cone) => {

    // 1. Calculate Overlap Check Variables (Keep these, they are correct)
    const dx = ball.x - cone.x;
    // The vertical overlap check uses the center line of interaction
    const dy = (ball.y - BALL_RADIUS * 0.5) - ((cone.y + cone.height / 2));

    // ... (The distance calculation and collision check remains the same)
    const CONE_HALF_WIDTH = cone.width / 2;
    if (Math.abs(dx) > CONE_HALF_WIDTH + ball.radius || Math.abs(dy) > 100) { // Simple bounding box quick exit

      // Detailed collision check logic... (rest of your previous code block here)
      let closestX = Math.max(cone.x - CONE_HALF_WIDTH, Math.min(ball.x, cone.x + CONE_HALF_WIDTH));
      let closestY = Math.max(cone.y - 4, Math.min(ball.y - ball.radius * 0.5, canvas.height - 180)); // Simplified Y check

      const distX = ball.x - closestX;
      const distY = ball.y - closestY;
      const distanceSquared = (distX * distX + distY * distY);


      if (distanceSquared < (ball.radius * ball.radius)) {

        // Collision confirmed!
        cone.falling = true;

        // --- FIXED LINE HERE ---
        // Instead of using Math.sign(Math.cos(angle)), we use the sign of the horizontal difference (dx)
        const directionalKickSign = Math.sign(dx);

        // Apply impulse: transfer horizontal velocity plus a directional kick based on where it hit.
        cone.vx = ball.vx * 0.7 + directionalKickSign * 5; // Using dx sign for direction
        cone.vy = -8;

        // Apply initial spin: Use the side of impact (positive or negative) to set the spin rate
        cone.rotation += Math.sign(dx) * 2;
      }
    }
  });
}



function render() {


  ctx.clearRect(0, 0, canvas.width, canvas.height);


  drawSky();
  drawMountains();


  updateClouds();
  clouds.forEach(drawCloud);


  updateBirds();
  birds.forEach(drawBird);


  drawGrass();


  updateBallPhysics();
  updateCones(); // Physics updates must run before rendering
  detectConeCollision();


  cones.forEach(drawCone);
  drawBall();


  requestAnimationFrame(render);
}


loadSoccerBall(); 
render();


canvas.addEventListener('mousedown', (e) => {


  mouse.down = true;
  mouse.x = e.clientX;
  mouse.y = e.clientY;


  const dist = Math.hypot(mouse.x - ball.x, mouse.y - ball.y);


  if (dist < ball.radius) {


    ball.dragging = true;
    ball.dragOffsetX = mouse.x - ball.x;
    ball.dragOffsetY = mouse.y - ball.y;

    // When starting drag, reset physics state
    ball.lastX = ball.x;
    ball.lastY = ball.y;


    return;
  }


  cones.forEach((cone) => {


    // Check for collision zone using simplified bounding box checks
    if (
      mouse.x > cone.x - 40 &&
      mouse.x < cone.x + 40 &&
      mouse.y > cone.y - cone.height &&
      mouse.y < cone.y + 10
    ) {

      cone.dragging = true;
      // Reset falling state and set initial drag velocity tracker
      cone.falling = false; 
      cone.rotation = 0;
      cone.dragVx = 0;
      cone.dragVy = 0;

    }


  });
});


canvas.addEventListener('mousemove', (e) => {


  mouse.x = e.clientX;
  mouse.y = e.clientY;


  if (ball.dragging) {


    // Ball movement logic remains the same
    ball.x = mouse.x - ball.dragOffsetX;
    ball.y = mouse.y - ball.dragOffsetY;

    ball.vx = ball.x - ball.lastX;
    ball.vy = ball.y - ball.lastY;

    ball.lastX = ball.x;
    ball.lastY = ball.y;
  }


  cones.forEach((cone) => {


    if (cone.dragging) {
      // Update cone position directly to the mouse cursor
      cone.x = mouse.x;
      cone.y = mouse.y;

      // Track velocity while dragging
      const dragDx = mouse.x - (cone.dragVx === undefined ? cone.x : cone.x); // Approximation using current state or last recorded position
      const dragDy = mouse.y - (cone.dragVy === undefined ? cone.y : cone.y);

      // Smoothly update the stored velocity tracker
      cone.dragVx = (1 - 0.1) * cone.dragVx + 0.1 * dragDx; // Exponential smoothing for smoother tracking
      cone.dragVy = (1 - 0.1) * cone.dragVy + 0.1 * dragDy;
    }


  });
});


canvas.addEventListener('mouseup', () => {


  mouse.down = false;


  if (ball.dragging) {


    ball.dragging = false;

    // Apply force based on velocity when releasing the ball
    ball.rotationSpeed = ball.vx * 0.05;
  }


  cones.forEach((cone) => {


    if (cone.dragging) {


      cone.dragging = false;

      // === START OF FIX: Apply physics on release ===
      const floor = canvas.height - 140;
      
      // Set initial velocities based on drag velocity tracker
      cone.vx = cone.dragVx * 2; // Scale up the stored speed for a satisfying "throw"
      cone.vy = cone.dragVy * 2; 
      
      // Ensure falling state is active immediately
      cone.falling = true;
      
      // Reset drag trackers
      cone.dragVx = 0;
      cone.dragVy = 0;

      // Optional: Add a small initial spin based on direction of throw
      const spinDirection = cone.vx > 5 ? 1 : (cone.vx < -5 ? -1 : 0);
      cone.rotation += spinDirection * 0.5;


    }


  });
});


canvas.addEventListener('click', (e) => {


  const dist = Math.hypot(e.clientX - ball.x, e.clientY - ball.y);


  if (dist < ball.radius && !ball.dragging) {


    const direction = Math.random() > 0.5 ? 1 : -1;


    ball.vx += 10 * direction;
    ball.vy = -10;
    ball.rotationSpeed += 0.18 * direction;
  }
});


</script>


</body>
</html>
