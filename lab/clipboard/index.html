<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clipboard · JCYL</title>
  <meta name="description" content="Shared clipboard across devices — powered by Firebase">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e10;
      --surface: #1a1a1e;
      --surface2: #242429;
      --border: #2e2e35;
      --text: #e4e4e7;
      --text2: #a1a1aa;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --radius: 10px;
      --radius-sm: 6px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --mono: 'JetBrains Mono', 'Fira Code', monospace;
    }
    html { font-size: 15px; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    #app {
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    /* ─── Setup Screen ─── */
    .setup-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 32px;
      text-align: center;
    }
    .setup-card .logo {
      font-size: 2.4rem;
      margin-bottom: 4px;
    }
    .setup-card h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .setup-card .sub {
      color: var(--text2);
      font-size: 0.9rem;
      margin-bottom: 28px;
    }
    .setup-card label {
      display: block;
      text-align: left;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text2);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .setup-card input {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 1.1rem;
      font-family: var(--mono);
      outline: none;
      transition: border .2s;
    }
    .setup-card input:focus {
      border-color: var(--accent);
    }
    .setup-card .input-wrap {
      margin-bottom: 20px;
    }
    .setup-card .room-suffix {
      margin-top: 10px;
      font-size: 0.8rem;
      color: var(--text2);
    }
    .setup-card .room-suffix button {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 0.8rem;
      text-decoration: underline;
    }

    /* ─── Buttons ─── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 11px 24px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, opacity .2s;
    }
    .btn:disabled { opacity: .5; cursor: default; }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--border);
    }
    .btn-danger:hover:not(:disabled) {
      background: var(--danger);
      color: #fff;
    }
    .btn-ghost {
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover:not(:disabled) {
      background: var(--surface2);
      color: var(--text);
    }
    .btn-sm {
      padding: 6px 12px;
      font-size: 0.8rem;
    }
    .btn-block {
      width: 100%;
      justify-content: center;
    }

    /* ─── Main Screen ─── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header .logo-icon { font-size: 1.3rem; }
    .header .room-name {
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--text2);
      background: var(--surface);
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    .status-dot.online { background: #22c55e; }
    .status-dot.offline { background: var(--danger); }
    .status-dot.connecting { background: #eab308; }

    /* ─── Input Form ─── */
    .input-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 20px;
    }
    .input-card input[type="text"],
    .input-card textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 0.9rem;
      padding: 10px 12px;
      outline: none;
      transition: border .2s;
      font-family: var(--font);
    }
    .input-card input[type="text"]:focus,
    .input-card textarea:focus {
      border-color: var(--accent);
    }
    .input-card input[type="text"] {
      margin-bottom: 10px;
    }
    .input-card textarea {
      resize: vertical;
      min-height: 80px;
      line-height: 1.5;
    }
    .input-card .char-count {
      text-align: right;
      font-size: 0.75rem;
      color: var(--text2);
      margin-top: 4px;
    }
    .input-card .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .input-card .actions .btn { flex: 1; }

    /* ─── Image Drop Zone ─── */
    .dropzone {
      border: 2px dashed var(--border);
      border-radius: var(--radius-sm);
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: border .2s, background .2s;
      margin-top: 10px;
      position: relative;
    }
    .dropzone:hover,
    .dropzone.dragover {
      border-color: var(--accent);
      background: rgba(59,130,246,.06);
    }
    .dropzone .hint {
      color: var(--text2);
      font-size: 0.85rem;
    }
    .dropzone .hint .icon { font-size: 1.5rem; display: block; margin-bottom: 4px; }
    .dropzone img {
      max-width: 100%;
      max-height: 200px;
      border-radius: var(--radius-sm);
      display: block;
      margin: 0 auto;
    }
    .dropzone .remove-img {
      position: absolute;
      top: 6px;
      right: 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text2);
      border-radius: 50%;
      width: 28px;
      height: 28px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color .2s;
    }
    .dropzone .remove-img:hover { color: var(--danger); }

    /* ─── Items Feed ─── */
    .feed { padding-bottom: 60px; }
    .feed-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .feed-header h2 {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .feed-header .count {
      font-size: 0.8rem;
      color: var(--text2);
    }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text2);
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 8px; }
    .empty-state p { font-size: 0.9rem; }

    .item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
      animation: fadeIn .3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .item-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      color: var(--text2);
    }
    .item-meta .type-badge {
      text-transform: uppercase;
      font-weight: 600;
      font-size: 0.65rem;
      letter-spacing: 0.05em;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--surface2);
    }
    .item-actions {
      display: flex;
      gap: 4px;
    }
    .item-actions button {
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
      font-size: 0.85rem;
      transition: background .15s, color .15s;
    }
    .item-actions button:hover {
      background: var(--surface2);
      color: var(--text);
    }
    .item-actions .del-btn:hover {
      background: rgba(239,68,68,.15);
      color: var(--danger);
    }
    .item-title {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 4px;
      word-break: break-word;
    }
    .item-text {
      font-size: 0.85rem;
      line-height: 1.5;
      color: var(--text2);
      word-break: break-word;
      white-space: pre-wrap;
      max-height: 200px;
      overflow-y: auto;
    }
    .item-text .expand-btn {
      display: block;
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 0.8rem;
      margin-top: 4px;
      padding: 0;
    }
    .item-image {
      margin-top: 6px;
    }
    .item-image img {
      max-width: 100%;
      max-height: 300px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: opacity .2s;
    }
    .item-image img:hover { opacity: .85; }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 20px;
      font-size: 0.85rem;
      color: var(--text);
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
      opacity: 0;
      transition: opacity .3s, transform .3s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ─── Image Modal ─── */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
      padding: 16px;
    }
    .modal.open {
      opacity: 1;
      pointer-events: all;
    }
    .modal img {
      max-width: 100%;
      max-height: 90vh;
      border-radius: var(--radius-sm);
      box-shadow: 0 8px 40px rgba(0,0,0,.5);
    }
    .modal .close-modal {
      position: absolute;
      top: 16px;
      right: 20px;
      background: none;
      border: none;
      color: #fff;
      font-size: 1.8rem;
      cursor: pointer;
      opacity: .7;
      transition: opacity .2s;
    }
    .modal .close-modal:hover { opacity: 1; }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text2);
    }
    .loading .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: rgba(239,68,68,.12);
      border: 1px solid rgba(239,68,68,.3);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      color: var(--danger);
      font-size: 0.85rem;
      margin-bottom: 16px;
    }
    .error-msg .retry-btn {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      text-decoration: underline;
      font-size: 0.85rem;
      margin-left: 6px;
    }

    @media (max-width: 520px) {
      body { padding: 10px; }
      .setup-card { padding: 28px 20px; }
      .input-card { padding: 12px; }
      .header .room-name { max-width: 120px; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ═══ Setup Screen ═══ -->
  <div id="setup-screen" class="screen">
    <div class="setup-card">
      <div class="logo">📋</div>
      <h1>Clipboard</h1>
      <p class="sub">Shared clipboard, synced across devices</p>

      <div id="config-error" class="error-msg" style="display:none;text-align:left;margin-bottom:16px;"></div>

      <div class="input-wrap">
        <label for="room-input">Room name</label>
        <input type="text" id="room-input" placeholder="e.g. my-clipboard" autocomplete="off" spellcheck="false">
        <div class="room-suffix">
          Share this name with your other devices to sync.
          <button type="button" id="random-room-btn">Generate random</button>
        </div>
      </div>

      <button id="enter-room-btn" class="btn btn-primary btn-block" disabled>
        <span>🔗</span> Enter Room
      </button>

      <div style="margin-top:16px;font-size:0.75rem;color:var(--text2)">
        <span id="setup-status"></span>
      </div>
    </div>
  </div>

  <!-- ═══ Main Screen ═══ -->
  <div id="main-screen" class="screen">
    <div class="header">
      <div class="header-left">
        <span class="logo-icon">📋</span>
        <span class="room-name" id="room-display"></span>
        <span class="status-dot offline" id="status-dot" title="Connection status"></span>
      </div>
      <div>
        <button id="leave-btn" class="btn btn-ghost btn-sm">Leave</button>
      </div>
    </div>

    <div id="main-error" class="error-msg" style="display:none;"></div>

    <div class="input-card" id="input-card">
      <input type="text" id="title-input" placeholder="Title (optional)" autocomplete="off">
      <textarea id="content-input" placeholder="Paste text here... or drop an image below" rows="3"></textarea>
      <div class="char-count"><span id="char-count">0</span></div>

      <div class="dropzone" id="dropzone">
        <div class="hint" id="dropzone-hint">
          <span class="icon">🖼️</span>
          Drop image here or click to upload
        </div>
        <img id="image-preview" style="display:none;" alt="Preview">
        <button class="remove-img" id="remove-img-btn" style="display:none;" title="Remove image">✕</button>
      </div>
      <input type="file" id="file-input" accept="image/*" style="display:none">

      <div class="actions">
        <button id="save-btn" class="btn btn-primary" disabled>📋 Save</button>
        <button id="clear-btn" class="btn btn-ghost">Clear</button>
      </div>
    </div>

    <div class="feed">
      <div class="feed-header">
        <h2>Items</h2>
        <span class="count" id="item-count">0</span>
      </div>
      <div id="feed-list"></div>
    </div>
  </div>

  <!-- ═══ Image Modal ═══ -->
  <div class="modal" id="image-modal">
    <button class="close-modal" id="close-modal-btn">✕</button>
    <img id="modal-image" src="" alt="Full size">
  </div>

  <!-- ═══ Toast ═══ -->
  <div class="toast" id="toast"></div>
</div>

<script>
/* ============================================================
   🔧  FIREBASE CONFIG
   ============================================================
   Replace this object with your own Firebase project config.
   Steps:
     1. Go to https://console.firebase.google.com/
     2. Create a project (or use existing)
     3. Enable Anonymous Auth (Authentication → Sign-in method)
     4. Create Firestore database (choose test mode initially)
     5. Create Storage bucket (use default settings)
     6. Click "Add app" → Web → copy the config object
     7. Paste it below

   Recommended Firestore security rules for production:
     rules_version = '2';
     service cloud.firestore {
       match /databases/{database}/documents {
         match /clips/{doc} {
           allow read, write: if request.auth != null;
         }
       }
     }

   Recommended Storage security rules:
     rules_version = '2';
     service firebase.storage {
       match /b/{bucket}/o {
         match /{allPaths=**} {
           allow read, write: if request.auth != null;
         }
       }
     }
   ============================================================ */
  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyDiG3CTwqlAlRVHTF8A0uRopdWaFda7C6A",
    authDomain: "jcyl-clippy.firebaseapp.com",
    projectId: "jcyl-clippy",
    storageBucket: "jcyl-clippy.firebasestorage.app",
    messagingSenderId: "1033843294274",
    appId: "1:1033843294274:web:4dacbb63560d32718eaddb"
  };

  const IS_DEMO = FIREBASE_CONFIG.apiKey === "YOUR_API_KEY";

  // ─── Room helpers ───
  const ROOM_STORAGE_KEY = 'jcclip_room';

  async function hashRoomId(roomId) {
    const enc = new TextEncoder();
    const data = enc.encode(roomId.toLowerCase().trim());
    const buf = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  function generateRoomId() {
    const words = ['nova', 'echo', 'sigma', 'pulse', 'flux', 'peak', 'core', 'node', 'wave', 'sync',
                   'beam', 'forge', 'grid', 'link', 'mesh', 'rune', 'spark', 'tide', 'vibe', 'void'];
    const a = words[Math.floor(Math.random() * words.length)];
    const b = words[Math.floor(Math.random() * words.length)];
    const n = Math.floor(Math.random() * 99) + 10;
    return `${a}-${b}-${n}`;
  }

  // ─── Firebase state ───
  let app, db, auth, storage;
  let unsubscribeAuth, unsubscribeFeed;
  let currentRoom = '';         // plaintext room ID
  let currentRoomHash = '';     // SHA-256 hash (Firestore doc ID)
  let user = null;              // Firebase auth user
  let itemsCache = [];          // live list of items
  let pendingImage = null;      // { blob, dataUrl } or null
  let connected = false;

  // ─── DOM refs ───
  const $ = id => document.getElementById(id);
  const setupScreen = $('setup-screen');
  const mainScreen = $('main-screen');
  const roomInput = $('room-input');
  const enterBtn = $('enter-room-btn');
  const randomBtn = $('random-room-btn');
  const setupStatus = $('setup-status');
  const configError = $('config-error');
  const roomDisplay = $('room-display');
  const statusDot = $('status-dot');
  const leaveBtn = $('leave-btn');
  const mainError = $('main-error');
  const titleInput = $('title-input');
  const contentInput = $('content-input');
  const charCount = $('char-count');
  const saveBtn = $('save-btn');
  const clearBtn = $('clear-btn');
  const dropzone = $('dropzone');
  const dropzoneHint = $('dropzone-hint');
  const imagePreview = $('image-preview');
  const removeImgBtn = $('remove-img-btn');
  const fileInput = $('file-input');
  const feedList = $('feed-list');
  const itemCount = $('item-count');
  const imageModal = $('image-modal');
  const modalImage = $('modal-image');
  const closeModalBtn = $('close-modal-btn');
  const toastEl = $('toast');

  // ─── Toast ───
  let toastTimer;

  function showToast(msg) {
    clearTimeout(toastTimer);
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
  }

  // ─── Loading state ───
  function showLoading(el) {
    el.innerHTML = `<div class="loading"><div class="spinner"></div>Loading...</div>`;
  }

  // ─── Error display ───
  function showConfigError(msg) {
    configError.style.display = 'block';
    configError.textContent = msg;
  }

  function showMainError(msg, retryFn) {
    mainError.style.display = 'block';
    mainError.innerHTML = msg;
    if (retryFn) {
      const btn = document.createElement('button');
      btn.className = 'retry-btn';
      btn.textContent = 'Retry';
      btn.onclick = retryFn;
      mainError.appendChild(btn);
    }
  }

  function hideMainError() {
    mainError.style.display = 'none';
  }

  // ─── Screens ───
  function showScreen(screen) {
    [setupScreen, mainScreen].forEach(s => s.classList.remove('active'));
    screen.classList.add('active');
  }

  // ─── Image helpers ───
  function readFileAsDataURL(file) {
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result);
      r.onerror = reject;
      r.readAsDataURL(file);
    });
  }

  function dataURLToBlob(dataUrl) {
    const parts = dataUrl.split(',');
    const mime = parts[0].match(/:(.*?);/)[1];
    const bytes = atob(parts[1]);
    const arr = new Uint8Array(bytes.length);
    for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
    return new Blob([arr], { type: mime });
  }

  async function compressImage(dataUrl, maxW = 1920, quality = 0.82) {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => {
        let w = img.naturalWidth, h = img.naturalHeight;
        if (w > maxW) { h = h * (maxW / w); w = maxW; }
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        const ctx = c.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL('image/jpeg', quality));
      };
      img.src = dataUrl;
    });
  }

  function handleImageFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    if (file.size > 10 * 1024 * 1024) {
      showToast('Image must be under 10MB');
      return;
    }
    readFileAsDataURL(file).then(async (dataUrl) => {
      const compressed = await compressImage(dataUrl);
      pendingImage = { blob: dataURLToBlob(compressed), dataUrl: compressed };
      showImagePreview(compressed);
      updateSaveBtn();
    });
  }

  function showImagePreview(url) {
    imagePreview.src = url;
    imagePreview.style.display = 'block';
    dropzoneHint.style.display = 'none';
    removeImgBtn.style.display = 'flex';
  }

  function clearImagePreview() {
    pendingImage = null;
    imagePreview.src = '';
    imagePreview.style.display = 'none';
    dropzoneHint.style.display = 'block';
    removeImgBtn.style.display = 'none';
    fileInput.value = '';
    updateSaveBtn();
  }

  // ─── Save button state ───
  function updateSaveBtn() {
    const hasText = contentInput.value.trim().length > 0;
    const hasImage = pendingImage !== null;
    saveBtn.disabled = !(hasText || hasImage);
  }

  // ─── Char count ───
  contentInput.addEventListener('input', () => {
    const len = contentInput.value.length;
    charCount.textContent = len;
    if (len > 5000) charCount.style.color = 'var(--danger)';
    else charCount.style.color = '';
    updateSaveBtn();
  });
  titleInput.addEventListener('input', updateSaveBtn);

  // ─── Dropzone ───
  dropzone.addEventListener('click', () => fileInput.click());
  dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
  dropzone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropzone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) handleImageFile(file);
  });
  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) handleImageFile(fileInput.files[0]);
  });
  removeImgBtn.addEventListener('click', (e) => { e.stopPropagation(); clearImagePreview(); });

  // ─── Paste image ───
  document.addEventListener('paste', (e) => {
    if (!mainScreen.classList.contains('active')) return;
    const items = e.clipboardData.items;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        handleImageFile(item.getAsFile());
        return;
      }
    }
  });

  // ─── Content input paste ───
  contentInput.addEventListener('paste', (e) => {
    const items = e.clipboardData.items;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        handleImageFile(item.getAsFile());
        return;
      }
    }
  });

  // ─── Item rendering ───
  function timeAgo(ts) {
    if (!ts) return '';
    const sec = Math.floor((Date.now() - ts.toDate()) / 1000);
    if (sec < 5) return 'just now';
    if (sec < 60) return sec + 's ago';
    const min = Math.floor(sec / 60);
    if (min < 60) return min + 'm ago';
    const hr = Math.floor(min / 60);
    if (hr < 24) return hr + 'h ago';
    const d = Math.floor(hr / 24);
    return d + 'd ago';
  }

  function truncateText(text, max = 200) {
    if (text.length <= max) return text;
    return text.slice(0, max) + '...';
  }

  function createItemElement(item) {
    const div = document.createElement('div');
    div.className = 'item';
    div.dataset.id = item.id;

    const isText = item.type === 'text';
    const title = item.title || '';
    const content = item.text || '';

    let bodyHtml = '';
    if (isText) {
      const needsExpand = content.length > 200;
      bodyHtml = `<div class="item-text">${escapeHtml(truncateText(content, 200))}` +
        (needsExpand ? `<button class="expand-btn" data-full="${escapeHtml(content)}">Show more</button>` : '') +
        `</div>`;
    } else {
      bodyHtml = `<div class="item-image"><img src="${escapeHtml(item.imageUrl)}" alt="Clipboard image" loading="lazy"></div>`;
    }

    div.innerHTML = `
      <div class="item-header">
        <div class="item-meta">
          <span class="type-badge">${isText ? 'Text' : 'Image'}</span>
          <span>${timeAgo(item.createdAt)}</span>
        </div>
        <div class="item-actions">
          <button class="copy-btn" title="${isText ? 'Copy text' : 'Download image'}">${isText ? '📄' : '⬇️'}</button>
          <button class="del-btn" title="Delete">🗑️</button>
        </div>
      </div>
      ${title ? `<div class="item-title">${escapeHtml(title)}</div>` : ''}
      ${bodyHtml}
    `;

    // Copy / download
    const copyBtn = div.querySelector('.copy-btn');
    copyBtn.addEventListener('click', async () => {
      if (isText) {
        try {
          await navigator.clipboard.writeText(content);
          showToast('Copied to clipboard');
        } catch {
          showToast('Failed to copy');
        }
      } else {
        const a = document.createElement('a');
        a.href = item.imageUrl;
        a.download = item.imageName || 'clipboard-image.jpg';
        a.click();
        showToast('Downloading...');
      }
    });

    // Delete
    const delBtn = div.querySelector('.del-btn');
    delBtn.addEventListener('click', async () => {
      await deleteItem(item.id, item.type === 'image');
    });

    // Expand
    const expandBtn = div.querySelector('.expand-btn');
    if (expandBtn) {
      expandBtn.addEventListener('click', () => {
        const parent = expandBtn.closest('.item-text');
        parent.textContent = expandBtn.dataset.full;
      });
    }

    // Image click → modal
    const imgEl = div.querySelector('.item-image img');
    if (imgEl) {
      imgEl.addEventListener('click', () => openModal(item.imageUrl));
    }

    return div;
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function renderFeed(items) {
    if (items.length === 0) {
      feedList.innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>Clipboard is empty.<br>Save something above to get started.</p></div>`;
      itemCount.textContent = '0';
      return;
    }
    const frag = document.createDocumentFragment();
    for (const item of items) {
      frag.appendChild(createItemElement(item));
    }
    feedList.innerHTML = '';
    feedList.appendChild(frag);
    itemCount.textContent = items.length;
  }

  // ─── Modal ───
  function openModal(src) {
    modalImage.src = src;
    imageModal.classList.add('open');
  }

  function closeModal() {
    imageModal.classList.remove('open');
    modalImage.src = '';
  }

  closeModalBtn.addEventListener('click', closeModal);
  imageModal.addEventListener('click', (e) => { if (e.target === imageModal) closeModal(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

  // ─── Firebase operations ───
  async function saveItem() {
    if (!user || !currentRoomHash) return;
    const title = titleInput.value.trim();
    const text = contentInput.value.trim();
    const hasImage = pendingImage !== null;

    if (!text && !hasImage) return;

    hideMainError();
    saveBtn.disabled = true;
    saveBtn.textContent = 'Saving...';

    try {
      let data = {
        roomHash: currentRoomHash,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        title: title || ''
      };

      if (hasImage && pendingImage) {
        data.type = 'image';
        const ext = 'jpg';
        const imageName = `${Date.now()}-${Math.random().toString(36).slice(2, 8)}.${ext}`;
        const ref = storage.ref(`clips/${currentRoomHash}/${imageName}`);
        await ref.put(pendingImage.blob, { contentType: 'image/jpeg' });
        const downloadUrl = await ref.getDownloadURL();
        data.imageUrl = downloadUrl;
        data.imageName = imageName;
      } else {
        data.type = 'text';
        data.text = text;
      }

      await db.collection('clips').add(data);
      contentInput.value = '';
      titleInput.value = '';
      charCount.textContent = '0';
      clearImagePreview();
      showToast('Saved!');
    } catch (err) {
      showMainError('Failed to save: ' + err.message);
    }

    saveBtn.disabled = false;
    saveBtn.textContent = '📋 Save';
    updateSaveBtn();
  }

  async function deleteItem(itemId, isImage) {
    if (!user || !currentRoomHash) return;
    try {
      const item = itemsCache.find(i => i.id === itemId);
      if (isImage && item && item.imageName) {
        try {
          await storage.ref(`clips/${currentRoomHash}/${item.imageName}`).delete();
        } catch (_) { /* file may not exist */ }
      }
      await db.collection('clips').doc(itemId).delete();
      showToast('Deleted');
    } catch (err) {
      showToast('Failed to delete');
    }
  }

  async function clearAll() {
    if (!user || !currentRoomHash || itemsCache.length === 0) return;
    if (!confirm('Delete all items in this room?')) return;

    try {
      const batch = db.batch();
      for (const item of itemsCache) {
        batch.delete(db.collection('clips').doc(item.id));
        if (item.type === 'image' && item.imageName) {
          try {
            await storage.ref(`clips/${currentRoomHash}/${item.imageName}`).delete();
          } catch (_) { }
        }
      }
      await batch.commit();
      showToast('All items cleared');
    } catch (err) {
      showToast('Failed to clear: ' + err.message);
    }
  }

  // ─── Firebase subscription ───
  function subscribeToRoom(roomHash) {
    if (unsubscribeFeed) unsubscribeFeed();

    const q = db.collection('clips')
      .where('roomHash', '==', roomHash)
      .orderBy('createdAt', 'desc')
      .limit(100);

    unsubscribeFeed = q.onSnapshot((snapshot) => {
      itemsCache = [];
      snapshot.forEach(doc => {
        itemsCache.push({ id: doc.id, ...doc.data() });
      });
      renderFeed(itemsCache);
    }, (err) => {
      showMainError('Sync error: ' + err.message);
    });
  }

  // ─── Auth ───
  async function initFirebase() {
    if (IS_DEMO) {
      showConfigError('⚠️ Firebase not configured yet. Replace the placeholder config with your own Firebase project details (see instructions in the source code).');
      setupStatus.textContent = '⏸️ Waiting for configuration';
      return false;
    }

    try {
      app = firebase.initializeApp(FIREBASE_CONFIG);
      db = firebase.firestore(app);
      auth = firebase.auth(app);
      storage = firebase.storage(app);

      // Enable offline persistence
      await db.enablePersistence({ synchronizeTabs: true }).catch(() => {});

      setupStatus.textContent = '🔌 Connecting...';

      return new Promise((resolve) => {
        unsubscribeAuth = auth.onAuthStateChanged((u) => {
          user = u;
          if (u) {
            setupStatus.textContent = '✅ Connected';
            resolve(true);
          } else {
            auth.signInAnonymously().catch(err => {
              showConfigError('Auth failed: ' + err.message + '. Make sure Anonymous Authentication is enabled in Firebase Console.');
              setupStatus.textContent = '❌ Auth failed';
              resolve(false);
            });
          }
        }, (err) => {
          showConfigError('Firebase error: ' + err.message);
          setupStatus.textContent = '❌ Connection failed';
          resolve(false);
        });
      });
    } catch (err) {
      showConfigError('Firebase init error: ' + err.message);
      setupStatus.textContent = '❌ Init failed';
      return false;
    }
  }

  // ─── Room entry ───
  async function enterRoom(roomId) {
    if (!roomId || !roomId.trim()) return;
    roomId = roomId.trim().toLowerCase();

    if (!user) {
      const ok = await initFirebase();
      if (!ok) return false;
    }

    currentRoom = roomId;
    currentRoomHash = await hashRoomId(roomId);
    localStorage.setItem(ROOM_STORAGE_KEY, roomId);

    roomDisplay.textContent = roomId;
    statusDot.className = 'status-dot online';
    showScreen(mainScreen);
    subscribeToRoom(currentRoomHash);
    return true;
  }

  function leaveRoom() {
    if (unsubscribeFeed) unsubscribeFeed();
    if (unsubscribeAuth) unsubscribeAuth();
    itemsCache = [];
    currentRoom = '';
    currentRoomHash = '';
    feedList.innerHTML = '';
    contentInput.value = '';
    titleInput.value = '';
    charCount.textContent = '0';
    clearImagePreview();
    localStorage.removeItem(ROOM_STORAGE_KEY);
    showScreen(setupScreen);
    roomInput.value = '';
    roomInput.focus();
    setupStatus.textContent = '';
    configError.style.display = 'none';
    enterBtn.disabled = true;
  }

  // ─── UI event wiring ───
  roomInput.addEventListener('input', () => {
    enterBtn.disabled = !roomInput.value.trim();
  });
  roomInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !enterBtn.disabled) enterBtn.click();
  });

  enterBtn.addEventListener('click', async () => {
    enterBtn.disabled = true;
    enterBtn.textContent = '⏳ Joining...';
    const ok = await enterRoom(roomInput.value.trim());
    if (!ok) {
      enterBtn.disabled = false;
      enterBtn.textContent = '🔗 Enter Room';
    } else {
      enterBtn.textContent = '🔗 Enter Room';
    }
  });

  randomBtn.addEventListener('click', () => {
    roomInput.value = generateRoomId();
    enterBtn.disabled = false;
    roomInput.focus();
  });

  leaveBtn.addEventListener('click', leaveRoom);

  saveBtn.addEventListener('click', saveItem);
  clearBtn.addEventListener('click', () => {
    contentInput.value = '';
    titleInput.value = '';
    charCount.textContent = '0';
    clearImagePreview();
    updateSaveBtn();
  });

  // ─── Clear all via feed header ───
  const feedHeader = document.querySelector('.feed-header h2');
  feedHeader.addEventListener('dblclick', clearAll);

  // ─── Init ───
  async function init() {
    const savedRoom = localStorage.getItem(ROOM_STORAGE_KEY);

    if (IS_DEMO) {
      showScreen(setupScreen);
      setupStatus.textContent = '⚠️ Configure Firebase to get started';
      showConfigError('⚠️ Firebase not configured. Open this file in a text editor and replace the <code>FIREBASE_CONFIG</code> object with your own Firebase project config.');
      roomInput.focus();
      return;
    }

    setupStatus.textContent = '⏳ Initializing...';

    // Pre-init Firebase while user is on setup screen
    const fbReady = await initFirebase();

    if (savedRoom) {
      roomInput.value = savedRoom;
      enterBtn.disabled = false;
      if (fbReady) {
        await enterRoom(savedRoom);
        return;
      }
    }

    showScreen(setupScreen);
    roomInput.focus();
    if (!savedRoom) {
      roomInput.value = generateRoomId();
      enterBtn.disabled = false;
    }
  }

  init();
</script>
</body>
</html>
